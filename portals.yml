search_queries:
  - name: "Greenhouse - Materials / Characterization"
    query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io ("Materials Scientist" OR "Materials Engineer" OR "Characterization Engineer" OR "Analytical Scientist")'
    count: 5
    enabled: true

  - name: "Greenhouse - Failure Analysis / Reliability"
    query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io ("Failure Analysis" OR "Reliability Engineer" OR "Root Cause") materials OR semiconductor OR chemistry'
    count: 5
    enabled: true

  - name: "Greenhouse - Process Development / Formulation"
    query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io ("Process Development" OR "Process Chemist" OR "Formulation Scientist" OR "Development Chemist") polymer OR coating OR chemistry'
    count: 5
    enabled: true

  - name: "Ashby - Materials / Thin Films / Polymer"
    query: 'site:jobs.ashbyhq.com ("Materials Scientist" OR "Thin Film" OR polymer OR coatings OR characterization) PhD'
    count: 5
    enabled: true

  - name: "Ashby - Applications / Instrumentation"
    query: 'site:jobs.ashbyhq.com ("Applications Scientist" OR "Field Application Scientist" OR spectroscopy OR chromatography OR metrology)'
    count: 5
    enabled: true

  - name: "Lever - Analytical / CMC Small Molecule"
    query: 'site:jobs.lever.co ("Analytical Development" OR "CMC Analytical" OR "Analytical Scientist") "small molecule" OR formulation'
    count: 5
    enabled: true

  - name: "Lever - Materials / Coatings"
    query: 'site:jobs.lever.co ("Materials Scientist" OR coatings OR polymer OR "surface science")'
    count: 5
    enabled: true

  - name: "BioSpace - Analytical Development Small Molecule"
    query: 'site:biospace.com ("Analytical Development" OR "CMC Analytical" OR formulation) "small molecule" scientist'
    count: 5
    enabled: true

  - name: "LinkedIn - Applications Scientist / Spectroscopy"
    query: 'site:linkedin.com/jobs ("Applications Scientist" OR "Field Application Scientist") spectroscopy OR chromatography OR materials'
    count: 5
    enabled: true

  - name: "LinkedIn - Semiconductor Process / Metrology"
    query: 'site:linkedin.com/jobs ("Process Engineer" OR "Characterization Engineer" OR metrology OR deposition) semiconductor OR thin film'
    count: 5
    enabled: true

  - name: "Indeed - Failure Analysis / Reliability"
    query: 'site:indeed.com ("Failure Analysis" OR "Reliability Engineer" OR "Reliability Scientist") materials OR chemistry OR semiconductor'
    count: 5
    enabled: true

  - name: "Indeed - Process Chemist / Development Chemist"
    query: 'site:indeed.com ("Process Chemist" OR "Development Chemist" OR "Formulation Scientist") polymer OR coatings OR chemistry'
    count: 5
    enabled: true

  - name: "Wellfound - Materials / Chemistry Startup"
    query: 'site:wellfound.com/jobs ("Materials Scientist" OR chemist OR analytical OR polymer) biotech OR battery OR semiconductor'
    count: 5
    enabled: true

  - name: "Remote - Analytical / Materials Scientist"
    query: '("Analytical Scientist" OR "Applications Scientist" OR "Materials Scientist") remote chemistry OR materials'
    count: 3
    enabled: true

